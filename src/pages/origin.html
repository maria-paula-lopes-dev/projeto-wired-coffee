<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Origem do Café - Wired Coffee</title>

    <!-- BIBLIOTECA DE ÍCONES -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- FAVICON -->
    <link rel="shortcut icon" href="../assets/images/favicon/favicon-wired.svg" type="image/x-icon">

    <!-- CSS -->
    <link rel="stylesheet" href="../styles/main.css">

    <!-- JS -->
    <script src="../scripts/main.js" defer></script>
</head>
<body>
    
    <!-- HEADER -->
    <div id="header-placeholder"></div>
    <!-- HEADER -->

    <!-- MAIN -->
    <main class="main">

        <!-- SECTION HERO ORIGIN -->
        <section class="section section--bg-image hero__origin u-text-center">

            <div class="hero__content">
                <p class="u-eyebrow u-text-color hero__text u-text-inverse">
                    Mergulhe no Universo da Cafeína
                </p>
                <h1 class="u-text-inverse hero__title">De Onde Veio o Café?</h1>
            </div>

        </section>
        <!-- SECTION HERO ORIGIN -->

        <!-- Section Introdução -->
        <section class="section section--dark origin-intro">

            <div class="container u-text-center origin-intro__content">

                <p class="u-eyebrow u-text-color origin-intro__text u-text-inverse">
                    Jornada do Café
                </p>

                <p class="learn-intro__text u-text-inverse">
                    Muito antes de chegar à sua xícara, o café percorreu séculos de história, atravessou culturas e continentes, e se transformou em uma das bebidas mais consumidas do mundo.
                </p>
            </div>
            

        </section>
        <!-- Section Introdução -->

    </main>
    <!-- MAIN -->

    <!-- FOOTER -->
    <div id="footer-placeholder"></div>
    <!-- FOOTER -->
</body>
</html>
