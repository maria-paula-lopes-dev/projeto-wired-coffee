<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wired Coffee</title>
    <meta name="description" content="Aprenda sobre café, receitas, métodos e equipamentos.">

    <!-- BIBLIOTECA DE ÍCONES -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- FAVICON -->
    <link rel="shortcut icon" href="src/assets/images/favicon/favicon-wired.svg" type="image/x-icon">

    <!-- CSS -->
    <link rel="stylesheet" href="src/styles/main.css">

     <!-- JS -->
    <script src="src/scripts/main.js" defer></script>
</head>
<body>
    <!-- HEADER -->
    <header class="header"> <!-- BLOCK -->
        <!-- LOGO MENU -->
        <a href="/" class="header__logo"> <!-- Normalmente a logo é um atalho pra Home -->
            <picture>
                <!-- A imagem da logo vai denpender do tamanho da tela. Se for maior que 768px, ele adiciona a imagem pra desktop, senão ele manté, a pra mobile (favicon) -->
                <source media="(min-width: 768px)" srcset="src/assets/images/logo/logo-wired-pc.png">
                <!-- Imagem MB -->
                 <img src="src/assets/images/favicon/favicon-wired.svg" alt="Logo Wired">
            </picture>
        </a><!-- LOGO MENU -->

        <!-- MENU  -->
        <nav class="header__nav">
            <ul class="header__menu">
                <li class="header__itens">
                    <a href="" class="header__links">Home</a>
                </li>

                <li class="header__itens">
                    <a href="" class="header__links">Receitas</a>
                </li>

                <li class="header__itens">
                    <a href="" class="header__links">Sobre Café</a>
                </li>
            </ul>
        </nav><!-- MENU -->

        <!-- BOTÃO TOGGLE DO MENU (controle de estado via JS) -->
        <button class="header__toggle" aria-label="Abrir menu">
            <!-- ÍCONE: estado FECHADO (hamburger) -->
            <i class="fa-solid fa-bars-staggered header__icon"></i>

            <!-- ÍCONE: estado ABERTO (close) -->
            <i class="fa-solid fa-xmark header__icon"></i>
        </button>
        <!-- BOTÃO TOGGLE DO MENU -->
    
    </header><!-- HEADER -->

    <!-- MAIN -->
    <main class="main">
        <!-- SECTION HERO -->
        <section class="section section--dark hero__home u-text-center">

            <!-- Pra que no desktop, estejam um ao lado do outro -->
            <div class="u-container-flex container">
                <div class="container u-text-center hero__content"> <!-- DIV CONTENT -->
                    <!-- Nome usado em UX: pequeno texto acima do título -->
                    <p class="u-eyebrow u-text-inverse hero__eyebrow">Descubra qual a sua receita favorita</p>
                    <h1 class="u-text-inverse hero__title">Wired Coffee</h1>
                    <p class="u-text-inverse hero__text">
                        Uma experiência pensada para quem quer ir além do café comum. Explore receitas, métodos e sabores que transformam o simples ato de fazer café em uma experiência completa.
                    </p>
                
                    <a href="#" class="link--btn hero__cta ">Explorar Receitas</a>
                </div> <!-- DIV CONTENT -->

                <div class="hero__midia"> <!-- DIV MIDIA -->
                    <!-- Grãos (decorativo) -->
                    <img src="src/assets/images/home/graos-hero.png" alt="Grãos de Café" class="hero__bg">
                    <!-- Xícara (responsiva) -->
                    <picture>
                        <source media="(min-width: 768px)" srcset="src/assets/images/home/home-hero-pc.png">
                        <img src="src/assets/images/home/home-hero-sp.png" alt="Xícara de Café" class="hero__cup">
                    </picture>
                </div> <!-- DIV MIDIA -->
            </div>

        </section> <!-- SECTION HERO -->
    </main> <!-- BLOCK -->
    <!-- MAIN -->
</body>
</html>

<!-- CLASSE DE ESTADO
    - são classes utilitárias adicionais aplicadas dinamecamente aos elementos para representar e estilizar diferentes condições e comportamentos
    - como 'ativo', 'oculto' ou 'erro'
    - complementam o design base e permitem mudanças visuais controladas por js sem depender de pseudo-classes como :hover
    - modificam o estilo do elemento baseado no seu 'estado' atual na interface
    - diferem de classes estruturais como '.botao', '.card' porque são temporárias e toffladas por js
-->
